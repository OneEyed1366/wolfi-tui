# Local-only workflow — run via `act` pre-push hook.
# Uses --bind so native bindings + pnpm store from the workspace are available.
name: Local CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: lint / build / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

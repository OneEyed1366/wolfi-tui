name: CI

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    name: lint / build / typecheck / test
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Check
        run: pnpm check

  native:
    name: Build native bindings (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: internal/core -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native bindings
        working-directory: internal/core
        run: pnpm build:rust

      - name: Generate index.cjs
        run: cp internal/core/index.js internal/core/index.cjs

      - name: Upload native bindings
        uses: actions/upload-artifact@v4
        with:
          name: wolfie-core-node
          path: |
            internal/core/*.node
            internal/core/index.cjs
          if-no-files-found: error

  e2e:
    name: E2E tests (Playwright)
    needs: [checks, native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium

      - name: Build all packages
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/__screenshots__/
          retention-days: 7

  release:
    name: Release Please
    needs: [checks, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  auto-merge-release:
    name: Auto-merge release PR
    needs: release
    if: needs.release.outputs.releases_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find and auto-merge release PR
        run: |
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "release-please--branches--master" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge on release PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --auto --squash --repo "${{ github.repository }}"
          else
            echo "No release PR found, skipping"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish to npm
    needs: [release, native]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Build all packages
        run: pnpm build

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish all packages to npm'
        type: boolean
        default: false
      skip_checks:
        description: 'Skip lint / build / typecheck / test'
        type: boolean
        default: false
      skip_e2e:
        description: 'Skip E2E tests (Playwright)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  checks:
    name: lint / build / typecheck / test
    if: inputs.skip_checks != true
    needs: collect-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Check
        run: pnpm check

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            internal/*/build/
            packages/*/build/
          retention-days: 1

  native:
    name: Build native bindings
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            generate_cjs: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: internal/core -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native bindings
        working-directory: internal/core
        run: pnpm build:rust --target ${{ matrix.target }} ${{ matrix.cross && '--use-napi-cross' || '' }}

      - name: Generate index.cjs
        if: matrix.generate_cjs
        run: cp internal/core/index.js internal/core/index.cjs

      - name: List bindings
        run: ls -la internal/core/*.node

      - name: Upload combined bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            internal/core/*.node
            ${{ matrix.generate_cjs && 'internal/core/index.cjs' || '' }}
          if-no-files-found: error

  collect-native:
    name: Collect all native bindings
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all bindings
        uses: actions/download-artifact@v4
        with:
          path: internal/core
          pattern: bindings-*
          merge-multiple: true

      - name: List bindings
        run: ls -la internal/core/*.node internal/core/index.cjs

      - name: Upload combined bindings
        uses: actions/upload-artifact@v4
        with:
          name: wolfie-core-node
          path: |
            internal/core/*.node
            internal/core/index.cjs
          if-no-files-found: error

  e2e:
    name: E2E tests (Playwright)
    if: inputs.skip_e2e != true && inputs.skip_checks != true
    needs: [checks, collect-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Build all packages
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/__screenshots__/
          retention-days: 7

  release:
    name: Release Please
    needs: [checks, e2e, collect-native]
    if: ${{ !cancelled() && (needs.checks.result == 'success' || needs.checks.result == 'skipped') && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  auto-merge-release:
    name: Auto-merge release PR
    needs: release
    if: needs.release.outputs.releases_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find and auto-merge release PR
        run: |
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "release-please--branches--master" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge on release PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --squash --repo "${{ github.repository }}"
          else
            echo "No release PR found, skipping"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish to npm
    needs: [release, collect-native, checks]
    if: ${{ always() && !cancelled() && (needs.release.outputs.releases_created == 'true' || inputs.force_publish) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download combined native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Download build artifacts
        id: download-build
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true

      - name: Build packages (if build artifacts missing)
        if: steps.download-build.outcome == 'failure'
        run: pnpm build

      - name: Move binaries into platform packages
        working-directory: internal/core
        run: |
          for f in *.node; do
            # wolfie-layout.darwin-arm64.node → darwin-arm64
            platform="${f#wolfie-layout.}"
            platform="${platform%.node}"
            if [ -d "npm/$platform" ]; then
              cp "$f" "npm/$platform/$f"
              echo "Copied $f → npm/$platform/"
            fi
          done

      - name: List platform packages
        run: ls -la internal/core/npm/*/

      - name: Publish platform packages
        working-directory: internal/core
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --access public || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish workspace packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

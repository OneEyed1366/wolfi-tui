name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: Build native bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: internal/core -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native bindings
        working-directory: internal/core
        run: pnpm build:rust

      - name: Debug - list built files
        run: ls -la internal/core/ || echo "internal/core missing"

      - name: Upload native bindings
        uses: actions/upload-artifact@v4
        with:
          name: wolfie-core-node
          path: |
            internal/core/*.node
            internal/core/index.cjs
          if-no-files-found: error

  checks:
    name: lint / build / typecheck / test
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: .

      - name: Debug - list downloaded files
        run: find . -name "*.node" -o -name "index.cjs" 2>/dev/null | head -20 || echo "no native files found"

      - name: Check
        run: pnpm check

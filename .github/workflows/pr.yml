name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: Build native bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: internal/core -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native bindings
        working-directory: internal/core
        run: pnpm build:rust

      - name: Upload native bindings
        uses: actions/upload-artifact@v4
        with:
          name: wolfie-core-node
          path: |
            internal/core/*.node
            internal/core/index.cjs
          if-no-files-found: error

  checks:
    name: lint / build / typecheck / test
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          name: wolfie-core-node
          path: internal/core

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
